version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:26.4.0

jobs:
  validate-config:
    executor: node
    steps:
      - checkout
      - run:
          name: Show node version
          command: node --version
      - run:
          name: Install renovate
          command: |
            npm install renovate
      - run:
          name: Update
          command: |
            npm update
      - run:
          name: Validate config - default.json
          command: |
            npx --yes --package renovate -- renovate-config-validator --strict default.json

workflows:
  validation:
    jobs:
      - validate-config
